<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <!-- Minimalist cute flexed muscle icon -->
  <defs>
    <linearGradient id="muscle" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4A9A65"/>
      <stop offset="50%" stop-color="#5BA872"/>
      <stop offset="100%" stop-color="#A8D4B4"/>
    </linearGradient>
    <linearGradient id="hl" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Bicep bulge: rounded top, soft sides (front-view flex) -->
  <path d="M64 20 
    C92 20 112 42 108 70 
    C104 92 88 100 64 104 
    C40 100 24 92 20 70 
    C16 42 36 20 64 20 Z" 
    fill="url(#muscle)"/>
  <!-- Soft highlight -->
  <ellipse cx="52" cy="52" rx="18" ry="22" fill="url(#hl)" transform="rotate(-15 52 52)"/>
</svg>
