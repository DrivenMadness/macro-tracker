<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <!-- Chibi mascot: round head, big eyes, small body, pastel wellness theme -->
  <defs>
    <linearGradient id="skin" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFE4D4"/>
      <stop offset="100%" stop-color="#F5D0C0"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5BA872"/>
      <stop offset="100%" stop-color="#4A9A65"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Tiny body (mint shirt) -->
  <ellipse cx="64" cy="108" rx="28" ry="14" fill="#A8D4B4"/>
  <ellipse cx="64" cy="104" rx="22" ry="10" fill="#5BA872" opacity="0.4"/>
  <!-- Head -->
  <circle cx="64" cy="58" r="42" fill="url(#skin)" stroke="#E8C4B0" stroke-width="1.5"/>
  <!-- Blush -->
  <ellipse cx="38" cy="62" rx="8" ry="5" fill="#E8A0B0" opacity="0.5"/>
  <ellipse cx="90" cy="62" rx="8" ry="5" fill="#E8A0B0" opacity="0.5"/>
  <!-- Eyes (big chibi style) -->
  <ellipse cx="48" cy="54" rx="10" ry="12" fill="#2D3142"/>
  <ellipse cx="80" cy="54" rx="10" ry="12" fill="#2D3142"/>
  <circle cx="50" cy="52" r="3" fill="white"/>
  <circle cx="82" cy="52" r="3" fill="white"/>
  <!-- Smile -->
  <path d="M52 72 Q64 80 76 72" stroke="#2D3142" stroke-width="2" stroke-linecap="round" fill="none"/>
  <!-- Leaf on head (wellness/nutrition) -->
  <path d="M64 22 Q72 14 78 20 Q74 28 64 30 Q54 28 50 20 Q56 14 64 22 Z" fill="url(#leaf)"/>
  <path d="M64 22 L64 30" stroke="#4A9A65" stroke-width="1" opacity="0.6"/>
</svg>
