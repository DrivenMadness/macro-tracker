<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <!-- Smiling heart: pastel, cute, minimal -->
  <defs>
    <linearGradient id="heart" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8A0B0"/>
      <stop offset="50%" stop-color="#E07A7A"/>
      <stop offset="100%" stop-color="#D46A6A"/>
    </linearGradient>
  </defs>
  <!-- Heart shape -->
  <path d="M64 108 
    C64 108 20 78 20 48 
    C20 28 36 18 52 24 
    C58 14 70 14 64 24 
    C70 14 82 14 76 24 
    C92 18 108 28 108 48 
    C108 78 64 108 64 108 Z" 
    fill="url(#heart)"/>
  <!-- Eyes -->
  <ellipse cx="44" cy="52" rx="6" ry="8" fill="#2D3142"/>
  <ellipse cx="84" cy="52" rx="6" ry="8" fill="#2D3142"/>
  <circle cx="46" cy="50" r="2" fill="white"/>
  <circle cx="86" cy="50" r="2" fill="white"/>
  <!-- Smile -->
  <path d="M44 68 Q64 82 84 68" stroke="#2D3142" stroke-width="3" stroke-linecap="round" fill="none"/>
</svg>
